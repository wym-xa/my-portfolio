<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>响应式作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        /* 导航栏 */
        .navbar {
            background: #2c3e50;
            padding: 1rem;
            position: sticky;
            top: 0;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
        }
        /* 响应式：当屏幕宽度小于 768px 时，导航栏变成垂直布局 */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links {
                flex-direction: column;
                text-align: center;
                gap: 0.5rem;
            }
        }

        /* 卡片网格 */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .card-content {
            padding: 1rem;
        }
        /* 响应式图片已经自动适应（width:100%） */

        /* 小屏幕手机：调整字体和内边距 */
        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }
            .card-content {
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">我的作品集</div>
            <ul class="nav-links">
                <li><a href="#">首页</a></li>
                <li><a href="#">项目</a></li>
                <li><a href="#">关于</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <h1>响应式项目展示</h1>
        <div class="project-grid">
            <div class="card">
                <img src="https://picsum.photos/id/1/300/200" alt="项目1">
                <div class="card-content">
                    <h3>项目一</h3>
                    <p>自动适应手机、平板、电脑屏幕。</p>
                </div>
            </div>
            <div class="card">
                <img src="https://picsum.photos/id/2/300/200" alt="项目2">
                <div class="card-content">
                    <h3>项目二</h3>
                    <p>使用Grid布局和媒体查询实现响应式。</p>
                </div>
            </div>
            <div class="card">
                <img src="https://picsum.photos/id/3/300/200" alt="项目3">
                <div class="card-content">
                    <h3>项目三</h3>
                    <p>拖动浏览器窗口看看效果吧。</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
